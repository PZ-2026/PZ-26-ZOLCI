spring.application.name=backend

# Lokalny dev — nadpisywane przez application-prod.properties na serwerze
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:trainit}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

server.port=8080

app.security.jwt.secret=${JWT_SECRET:change-this-dev-secret-key}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
