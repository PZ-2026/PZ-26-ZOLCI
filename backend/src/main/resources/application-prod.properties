# ============================================================
# Profil produkcyjny — uruchom z: --spring.profiles.active=prod
# Wymagane zmienne środowiskowe:
#   DB_HOST       — adres hosta PostgreSQL (np. localhost lub IP)
#   DB_PORT       — port PostgreSQL (domyślnie 5432)
#   DB_NAME       — nazwa bazy danych
#   DB_USER       — użytkownik PostgreSQL
#   DB_PASSWORD   — hasło PostgreSQL
#   JWT_SECRET    — tajny klucz JWT (min. 32 znaki)
# ============================================================

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:trainit}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}

# Wyłącz logowanie zapytań SQL na produkcji
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Nie modyfikuj schematu automatycznie na produkcji
spring.jpa.hibernate.ddl-auto=validate

# Port serwera — zmień jeśli nginx/reverse proxy słucha na innym
server.port=${SERVER_PORT:8080}

# Akceptuj połączenia ze wszystkich interfejsów
server.address=0.0.0.0

# JWT
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

# Wyłącz szczegółowe błędy w odpowiedziach HTTP
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
